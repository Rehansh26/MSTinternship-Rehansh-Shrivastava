<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backend Portal Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #212529; 
            color: #f8f9fa; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }
        .login-card { 
            background-color: #343a40; 
            border-top: 4px solid #0dcaf0; 
            border-radius: 8px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.6); 
        }
    </style>
</head>
<body>
    <div class="container" style="max-width: 400px;">
        <div class="text-center mb-4">
            <h3 class="fw-bold text-info">⚙️ Backend Portal</h3>
            <p class="text-muted small text-uppercase fw-bold letter-spacing-1">Restricted Access</p>
        </div>
        
        <div class="card login-card p-4 border-0">
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger py-2 small fw-bold border-0">{{ message }}</div>
                {% endfor %}
            {% endif %}
            
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted">USERNAME</label>
                    <input type="text" name="username" class="form-control bg-dark text-light border-secondary shadow-none" required autofocus>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold text-muted">PASSWORD</label>
                    <input type="password" name="password" class="form-control bg-dark text-light border-secondary shadow-none" required>
                </div>
                <button type="submit" class="btn btn-info w-100 fw-bold text-dark shadow-sm">Authenticate System</button>
            </form>
        </div>
        
        <div class="text-center mt-4">
            <a href="/" class="text-muted small text-decoration-none">← Return to Public Site</a>
        </div>
    </div>
</body>
</html>
